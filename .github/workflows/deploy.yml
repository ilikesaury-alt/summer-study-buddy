name: Deploy to GitHub Pages

# 推送到 main 分支时自动部署
on:
  push:
    branches: [main]
  # 允许手动触发
  workflow_dispatch:

# GitHub Pages 部署权限
permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只允许一个部署
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 安装依赖
        run: npm ci

      - name: 构建
        # GITHUB_REPOSITORY 环境变量会被 Vite 读取,自动设置正确的 base 路径
        run: npm run build

      - name: 上传构建产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
